<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">

<head>
    <meta charset="utf-8">
    <title>Workout Planer</title>
</head>

<body>
<h1>Workout Planer</h1>

<h2>Add Exercise</h2>
<form id="addExercise">

    <label for="ex">Exercise: </label>
    <input id="ex" type="text" name="ex"><br>

    <label for="set">Sets: </label>
    <input id="set" name="set" type="number"><br>

    <label for="rep">Reps: </label>
    <input id="rep" name="rep" type="number"><br>

    <input id="add" type="submit" value="Add"> <input id="reset" type="reset" value="Reset">

</form>
<h2>Workout</h2>
<ul id="workout">

</ul>


<script src="app.js"></script>
</body>
</html>
